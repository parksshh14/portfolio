<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <nav class="navbar">
        <div class="container">
          <div class="logo">
            <a href="index.html">My Portfolio</a>
          </div>
          <ul class="nav">
            <li><a href="team.html">Team</a></li>
            <li><a href="web.html">Web</a></li>
            <li><a href="python.html">Python</a></li>
          </ul>
        </div>
      </nav>

      <div class="content">
        <div class="top"></div>

        <div class="about-wrap">
          <div class="profile-card">
            <div class="profile-photo-wrap">
              <div class="profile-photo">
                <img src="profile_1.png" alt="프로필 사진" />
                <div class="photo-placeholder">
                </div>
              </div>
            </div>

            <div class="profile-info">
              <div class="profile-label">ABOUT ME</div>
              <h1 class="profile-name">박시현</h1>
              <div class="profile-divider"></div>
              <ul class="profile-details">
                <li>
                  <span class="detail-key">학교</span>
                  <span class="detail-val">중부대학교</span>
                </li>
                <li>
                  <span class="detail-key">학과</span>
                  <span class="detail-val">정보보호학과</span>
                </li>
                <li>
                  <span class="detail-key">학번</span>
                  <span class="detail-val">25학번</span>
                </li>
                <li>
                  <span class="detail-key">Github</span>
                  <span class="detail-val"
                    ><a href="https://github.com/parksshh14"
                      >https://github.com/parksshh14</a
                    ></span
                  >
                </li>
                <li>
                  <span class="detail-key">Blog</span>
                  <span class="detail-val"
                    ><a href="https://velog.io/@parksshh14/posts"
                      >https://velog.io/@parksshh14/posts</a
                    ></span
                  >
                </li>
              </ul>
            </div>
          </div>
          <div class="skills-section">
            <div class="skills-header">
              <span class="skills-label">SKILLS</span>
              <h2>할 수 있는 것들</h2>
            </div>
            <div class="skills-grid">
              <div class="skill-card">
                <div class="skill-icon-wrap">
                  <div class="skill-icon skill-icon--html">
                    <img src="html-img.svg" alt="HTML 아이콘" />
                  </div>
                </div>
                <div class="skill-name">HTML</div>
                <div class="skill-desc">
                  HTML을 활용한 웹 페이지 개발이 가능합니다.
                </div>
              </div>

              <div class="skill-card">
                <div class="skill-icon-wrap">
                  <div class="skill-icon skill-icon--css">
                    <img src="css-img.svg" alt="CSS 아이콘" />
                  </div>
                </div>
                <div class="skill-name">CSS</div>
                <div class="skill-desc">
                  CSS를 활용한 UI와 반응형 웹 개발이 가능합니다.
                </div>
              </div>

              <div class="skill-card">
                <div class="skill-icon-wrap">
                  <div class="skill-icon skill-icon--python">
                    <img src="python-img.png" alt="Python 아이콘" />
                  </div>
                </div>
                <div class="skill-name">Python</div>
                <div class="skill-desc">
                  Python을 활용한 프로그램 구현이 가능합니다. 
                </div>
              </div>
            </div>
          </div>
        </div>

    </div>
  </body>
</html>
